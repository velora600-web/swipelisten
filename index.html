<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swipelisten</title>
  <style>
    body{font-family:Arial;background:#07111f;color:white;padding:30px}
    .box{max-width:500px;margin:auto;background:#111827;padding:25px;border-radius:20px}
    input{width:100%;padding:12px;margin:8px 0 18px;border-radius:10px;border:0}
    button{padding:12px;border:0;border-radius:10px;background:#38bdf8;font-weight:bold}
    h1{font-size:36px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Swipelisten</h1>
    <p>Audiobook Speed Calculator</p>

    <label>Hours</label>
    <input id="hours" type="number" value="10">

    <label>Minutes</label>
    <input id="minutes" type="number" value="0">

    <label>Speed</label>
    <input id="speed" type="number" step="0.25" value="1.5">

    <button onclick="calc()">Calculate</button>

    <h2 id="result">Result will show here</h2>
  </div>

  <script>
    function calc(){
      const h = Number(document.getElementById('hours').value)
      const m = Number(document.getElementById('minutes').value)
      const s = Number(document.getElementById('speed').value)
      const total = (h * 60 + m) / s
      const rh = Math.floor(total / 60)
      const rm = Math.round(total % 60)
      document.getElementById('result').innerText = rh + 'h ' + rm + 'm'
    }
    calc()
  </script>
</body>
</html>
